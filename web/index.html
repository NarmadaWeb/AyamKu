<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AyamSegar - Toko Ayam Segar Online Terpercaya. Menyediakan berbagai macam daging ayam segar berkualitas tinggi langsung ke pintu Anda.">
  <meta name="keywords" content="ayam segar, jual ayam, daging ayam, ayam online, ayam potong">
  <meta name="author" content="AyamSegar Team">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AyamSegar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AyamSegar - Toko Ayam Segar Online</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      inset: 0; overflow: hidden;
      margin: 0; padding: 0;
      position: fixed;
      background-color: #ffffff;
    }
    #loading {
      align-items: center;
      display: flex;
      height: 100%;
      justify-content: center;
      width: 100%;
      flex-direction: column;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #4CAF50;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Memuat AyamSegar...</div>
  </div>

  <script>
    // Observe the body to see when the Flutter engine adds the glass pane
    // and then remove the loading screen.
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        if (mutation.addedNodes.length) {
          for (const node of mutation.addedNodes) {
            if (node.tagName === 'FLT-GLASS-PANE') {
              const loading = document.getElementById('loading');
              if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => loading.remove(), 500);
              }
              observer.disconnect();
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });
  </script>

  <!--
    The "flutter_bootstrap.js" script is generated by the Flutter tool
    during build or run. It handles the initialization of the Flutter engine.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
